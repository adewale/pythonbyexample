[score_model]
# Criterion weights mirror docs/example-quality-rubric.md. The registry
# makes the scoring model inspectable even before every example is broken
# down into per-criterion subscores.
conceptual_payoff = 1.0
rationale = 0.75
alternatives_and_boundaries = 0.75
executable_determinism = 1.0
python_idiom_and_accuracy = 1.0
literate_fit = 0.75
source_result_pairing = 0.75
concept_decomposition = 0.75
progressive_walkthrough = 0.75
representative_coverage = 0.75
practical_usefulness = 0.75
editorial_progression = 1.0

