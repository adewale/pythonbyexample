name: Regenerate generated files

# Generated drift is proposed in a bot-authored PR rather than pushed to main.
# Configure the GitHub App credentials and require Verify on main before enabling
# this workflow: repository YAML cannot enforce branch protection itself.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: regenerate-generated-files
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.REGENERATOR_APP_ID }}
          private-key: ${{ secrets.REGENERATOR_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Regenerate drift and open a verified PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHROME_PATH: /usr/bin/google-chrome
        run: |
          set -euo pipefail
          git config user.name "pythonbyexample-regenerator[bot]"
          git config user.email "pythonbyexample-regenerator[bot]@users.noreply.github.com"
          make build
          if ! make check-social-cards; then
            make social-cards
          fi
          make check-generated
          branch="automation/regenerate-generated-files-${{ github.run_id }}"
          git checkout -b "$branch"
          git add -A src/example_sources_data.py src/editorial_registry_data.py src/asset_manifest.py public
          if git diff --cached --quiet; then
            echo "Generated files are current."
            exit 0
          fi
          allowed='^(src/(example_sources_data|editorial_registry_data|asset_manifest)\.py|public/(_headers|og/.*|prototyping/.*|(site|syntax-highlight|editor|runner|search|search-index)(\.[0-9a-f]{12})?\.(css|js|json)))$'
          unexpected=$(git diff --cached --name-only | grep -Ev "$allowed" || true)
          test -z "$unexpected" || { echo "Unexpected generated path(s):"; echo "$unexpected"; exit 1; }
          git commit -m "Regenerate derived assets"
          git push origin "$branch"
          existing=$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --body "Automated generated-artifact refresh. Merge only after the required Verify check passes."
          else
            gh pr create --base main --head "$branch" --title "Regenerate derived assets" --body "Automated generated-artifact refresh. Merge only after the required Verify check passes."
          fi
