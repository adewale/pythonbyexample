<script nonce="__CSP_NONCE__">
const originalCode = __ORIGINAL_CODE_JSON__;
function editor() { return document.getElementById('code-editor'); }
function resizeEditor() { const field = editor(); field.style.height = 'auto'; field.style.height = field.scrollHeight + 'px'; }
function resetCode() { editor().value = originalCode; if (window.pythonByExampleEditor) window.pythonByExampleEditor.setValue(originalCode); resizeEditor(); editor().focus(); }
const resetButton = document.querySelector('[data-reset]');
if (resetButton) resetButton.addEventListener('click', resetCode);
resizeEditor();
editor().addEventListener('input', resizeEditor);
const form = document.querySelector('form');
const outputPanel = document.querySelector('.output-panel');
const challengeBox = document.querySelector('[data-turnstile-sitekey]');
let turnstileWidgetId = null;
let loadingTurnstile = null;
function loadTurnstile() {
  if (window.turnstile) return Promise.resolve();
  if (loadingTurnstile) return loadingTurnstile;
  loadingTurnstile = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
    script.async = true;
    script.defer = true;
    script.onload = resolve;
    script.onerror = () => reject(new Error('Turnstile failed to load'));
    document.head.appendChild(script);
  });
  return loadingTurnstile;
}
function removeTurnstile() {
  if (!challengeBox) return;
  if (window.turnstile && turnstileWidgetId !== null) {
    try { turnstile.remove(turnstileWidgetId); } catch (error) { try { turnstile.reset(turnstileWidgetId); } catch (inner) {} }
  }
  turnstileWidgetId = null;
  challengeBox.hidden = true;
  challengeBox.innerHTML = '';
}
async function requestTurnstileToken() {
  if (!challengeBox) throw new Error('Turnstile challenge is not configured');
  await loadTurnstile();
  challengeBox.hidden = false;
  return new Promise((resolve, reject) => {
    challengeBox.innerHTML = '';
    turnstileWidgetId = turnstile.render(challengeBox, {
      sitekey: challengeBox.dataset.turnstileSitekey,
      execution: 'execute',
      callback: (token) => { removeTurnstile(); resolve(token); },
      'error-callback': () => { removeTurnstile(); reject(new Error('Turnstile challenge failed')); },
      'expired-callback': () => { removeTurnstile(); reject(new Error('Turnstile challenge expired')); }
    });
    turnstile.execute(turnstileWidgetId);
  });
}
async function submitRun(turnstileToken = '') {
  outputPanel.removeAttribute('data-output-placeholder');
  if (window.pythonByExampleEditor) window.pythonByExampleEditor.syncTextarea();
  outputPanel.querySelector('code').textContent = 'Running in a Dynamic Python Worker…';
  const formData = new FormData(form);
  if (turnstileToken) formData.set('cf-turnstile-response', turnstileToken);
  const response = await fetch(form.action, {
    method: 'POST',
    body: new URLSearchParams(formData),
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
  });
  if (!response.ok) throw new Error('HTTP ' + response.status);
  const html = await response.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const challengeRequired = doc.querySelector('[data-turnstile-required]');
  if (challengeRequired) {
    outputPanel.querySelector('code').textContent = challengeRequired.textContent || 'Verification required before running edited code…';
    const token = await requestTurnstileToken();
    return submitRun(token);
  }
  const nextOutput = doc.querySelector('.output-panel');
  if (nextOutput) outputPanel.innerHTML = nextOutput.innerHTML;
}
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  try {
    await submitRun();
  } catch (error) {
    removeTurnstile();
    outputPanel.querySelector('code').textContent = 'Run failed: ' + error.message;
  }
});
const hash = new URL(window.location.href).hash;
if (hash.startsWith('#code=')) {
  try { editor().value = decodeURIComponent(escape(atob(hash.slice(6)))); } catch (error) {}
}
</script>
